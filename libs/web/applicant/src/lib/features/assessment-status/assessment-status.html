<main class="container page">
  <section class="card">
    <header class="card-header">
      <h1>Статус заявки</h1>
      <p class="card-subtitle m-0">Заявка сохранена. Ниже вы можете отслеживать этап обработки.</p>
    </header>

    <section class="status-card" id="application-status" aria-labelledby="application-status-title">
      <h2 class="card-title status-card-title" id="application-status-title">Текущий прогресс</h2>
      <p class="status-card-description">Статус обновляется по мере обработки заявки нотариусом.</p>
      <div class="status-card-current">
        <span class="text-bold">Текущий статус:</span>
        <span class="status-badge status-badge-current">Создана</span>
      </div>

      <ol class="status-steps" role="list">
        <li class="status-step status-step-done">
          <span class="status-step-dot" aria-hidden="true"></span>
          <span class="status-step-label">Создана</span>
        </li>
        <li class="status-step">
          <span class="status-step-dot" aria-hidden="true"></span>
          <span class="status-step-label">В проверке</span>
        </li>
        <li class="status-step">
          <span class="status-step-dot" aria-hidden="true"></span>
          <span class="status-step-label">Активна</span>
        </li>
        <li class="status-step">
          <span class="status-step-dot" aria-hidden="true"></span>
          <span class="status-step-label">В работе</span>
        </li>
        <li class="status-step">
          <span class="status-step-dot" aria-hidden="true"></span>
          <span class="status-step-label">Завершена</span>
        </li>
      </ol>
    </section>

    <div class="flex flex-wrap gap-4 justify-center mt-6">
      <a class="btn btn-outline" routerLink="/applicant/assessment" queryParamsHandling="preserve">
        Вернуться к параметрам
      </a>
      <a class="btn btn-primary" routerLink="/applicant/assessment/history">Открыть историю заявок</a>
    </div>
  </section>
</main>
