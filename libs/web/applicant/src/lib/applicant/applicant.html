<div class="applicant-wrapper">
  <lib-dashboard-layout
    [title]="'Нотариальная оценка'"
    [pageTitle]="pageTitle"
    [menuItems]="menuItems"
    [notificationCount]="unreadNotifications()"
    [notificationRoute]="'notifications'"
    [userLabel]="userLabel"></lib-dashboard-layout>

  <!-- ИИ-чат техподдержки: доступен на главной и во всех разделах ЛК заявителя -->
  <lib-support-ai-chat-widget
    [useBackendAi]="true"
    [operatorChatEnabled]="true"
    title="Техподдержка"
    subtitle="ИИ-помощник по заявкам, оценке и документам"
    (messageSubmit)="onSupportDraftSubmit($event)" />
</div>
