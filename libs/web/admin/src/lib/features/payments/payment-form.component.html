<div class="payment-form-page">
  <h2>{{ mode === 'edit' ? 'Редактирование платежа' : 'Создание платежа' }}</h2>

  <form [formGroup]="form" (ngSubmit)="submit()" class="payment-form">
    <label>
      Плательщик
      <input type="text" formControlName="payer" />
    </label>

    <label>
      Сумма (RUB)
      <input type="number" formControlName="amount" min="0.01" step="0.01" />
    </label>

    <label>
      Дата платежа
      <input type="date" formControlName="paymentDate" />
    </label>

    <label>
      Тип платежа
      <select formControlName="type">
        @for (type of paymentTypes; track type) {
          <option [value]="type">{{ getTypeLabel(type) }}</option>
        }
      </select>
    </label>

    <label>
      Метод оплаты
      <select formControlName="paymentMethod">
        @for (method of paymentMethods; track method) {
          <option [value]="method">{{ getMethodLabel(method) }}</option>
        }
      </select>
    </label>

    <label>
      Статус
      <select formControlName="status">
        @for (status of statuses; track status) {
          <option [value]="status">{{ getStatusLabel(status) }}</option>
        }
      </select>
    </label>

    <label>
      ID подписки
      <input type="text" formControlName="subscriptionId" />
    </label>

    <label>
      ID заявки
      <input type="text" formControlName="assessmentId" />
    </label>

    <label>
      ID транзакции
      <input type="text" formControlName="transactionId" />
    </label>

    <label>
      Название чека
      <input type="text" formControlName="attachmentFileName" />
    </label>

    <label>
      Ссылка на чек
      <input type="text" formControlName="attachmentFileUrl" />
    </label>

    <div class="actions">
      <button type="button" class="btn btn-secondary" (click)="cancel()">Отмена</button>
      <button type="submit" class="btn btn-primary">Сохранить</button>
    </div>
  </form>
</div>
