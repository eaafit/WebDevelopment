<div class="payment-form-page">
  <h2>{{ mode === 'edit' ? 'Редактирование платежа' : 'Создание платежа' }}</h2>

  @if (loading) {
    <p class="loading-hint">Загрузка данных...</p>
  }

  @if (error) {
    <p class="error-hint">{{ error }}</p>
  }

  @if (successMessage) {
    <p class="success-hint">{{ successMessage }}</p>
  }

  <form [formGroup]="form" (ngSubmit)="submit()" class="payment-form">
    <label>
      ID пользователя (userId)
      <input type="text" formControlName="userId" [disabled]="mode === 'edit'" />
      @if (form.get('userId')?.invalid && form.get('userId')?.touched) {
        <span class="field-error">Обязательное поле</span>
      }
    </label>

    <label>
      Плательщик
      <input type="text" formControlName="payer" />
      @if (form.get('payer')?.invalid && form.get('payer')?.touched) {
        <span class="field-error">Обязательное поле</span>
      }
    </label>

    <label>
      Сумма
      <input type="number" formControlName="amount" min="0.01" step="0.01" />
      @if (form.get('amount')?.invalid && form.get('amount')?.touched) {
        <span class="field-error">Минимум 0.01</span>
      }
    </label>

    <label>
      Валюта
      <select formControlName="currency">
        @for (currency of currencies; track currency) {
          <option [value]="currency">{{ currency }}</option>
        }
      </select>
    </label>

    <label>
      Дата платежа
      <input type="date" formControlName="paymentDate" />
    </label>

    <label>
      Тип платежа
      <select formControlName="type">
        @for (type of paymentTypes; track type) {
          <option [value]="type">{{ getTypeLabel(type) }}</option>
        }
      </select>
    </label>

    <label>
      Метод оплаты
      <select formControlName="paymentMethod">
        @for (method of paymentMethods; track method) {
          <option [value]="method">{{ getMethodLabel(method) }}</option>
        }
      </select>
    </label>

    <label>
      Статус
      <select formControlName="status">
        @for (status of statuses; track status) {
          <option [value]="status">{{ getStatusLabel(status) }}</option>
        }
      </select>
    </label>

    <label>
      Описание
      <textarea formControlName="description" rows="3"></textarea>
    </label>

    <label>
      ID подписки
      <input type="text" formControlName="subscriptionId" />
    </label>

    <label>
      ID заявки
      <input type="text" formControlName="assessmentId" />
    </label>

    <label>
      ID транзакции
      <input type="text" formControlName="transactionId" />
    </label>

    <label>
      Название чека
      <input type="text" formControlName="attachmentFileName" />
    </label>

    <label>
      Ссылка на чек
      <input type="text" formControlName="attachmentFileUrl" />
    </label>

    <div class="actions">
      <button type="button" class="btn btn-secondary" (click)="cancel()">Отмена</button>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Сохранение...' : 'Сохранить' }}
      </button>
    </div>
  </form>
</div>
