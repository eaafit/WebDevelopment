<main class="login">
  <h1>Восстановление пароля</h1>

  @if (done()) {
  <p class="login__hint">
    Если указанный адрес зарегистрирован, мы отправили на него ссылку для сброса пароля.
  </p>
  <a routerLink="/auth" class="home-link">Вернуться ко входу</a>
  } @else {
  <form class="login__form" (ngSubmit)="onSubmit()" novalidate>
    @if (validationError()) {
    <div class="login__error">{{ validationError() }}</div>
    }

  @if (error()) {
  <div class="login__error">{{ error() }}</div>
  }

  <div class="login__field">
    <label for="email">Email</label>
    <input
      id="email"
      name="email"
      type="email"
      [(ngModel)]="email"
      placeholder="you@example.com"
      autocomplete="email" />
  </div>

  <button class="btn-login" type="submit" [disabled]="loading()">
    {{ loading() ? 'Отправка…' : 'Отправить ссылку' }}
  </button>
  </form>

  <p class="login__footer-link">
    <a routerLink="/auth">Назад ко входу</a>
  </p>
  }
</main>
