<main class="login">
  <h1>Новый пароль</h1>

  @if (!token) {
  <div class="login__error">Ссылка недействительна или устарела. Запросите восстановление ещё раз.</div>
  <p class="login__footer-link"><a routerLink="/auth/forgot-password">Забыли пароль?</a></p>
  } @else {
  @if (error()) {
  <div class="login__error">{{ error() }}</div>
  }

  <form class="login__form" (ngSubmit)="onSubmit()" novalidate>
    <div class="login__field">
      <label for="pw">Новый пароль</label>
      <div class="login__password-control">
        <input
          id="pw"
          name="newPassword"
          [type]="showNewPassword() ? 'text' : 'password'"
          [(ngModel)]="newPassword"
          placeholder="Не менее 8 символов"
          autocomplete="new-password" />
        <button
          class="login__password-toggle"
          type="button"
          [attr.aria-label]="showNewPassword() ? 'Скрыть пароль' : 'Показать пароль'"
          [attr.title]="showNewPassword() ? 'Скрыть пароль' : 'Показать пароль'"
          (click)="toggleNewPasswordVisibility()">
          @if (showNewPassword()) {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 3l18 18" />
            <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58" />
            <path d="M9.88 4.24A9.4 9.4 0 0 1 12 4c5.5 0 9 5.5 9 8a6.4 6.4 0 0 1-1.56 2.95" />
            <path d="M6.1 6.1C4.14 7.46 3 10.06 3 12c0 2.5 3.5 8 9 8 1.27 0 2.43-.29 3.45-.76" />
          </svg>
          } @else {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2.5 12s3.5-7 9.5-7 9.5 7 9.5 7-3.5 7-9.5 7-9.5-7-9.5-7Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          }
        </button>
      </div>
    </div>

    <div class="login__field">
      <label for="pw2">Повтор пароля</label>
      <div class="login__password-control">
        <input
          id="pw2"
          name="confirmPassword"
          [type]="showConfirmPassword() ? 'text' : 'password'"
          [(ngModel)]="confirmPassword"
          placeholder="Повторите пароль"
          autocomplete="new-password" />
        <button
          class="login__password-toggle"
          type="button"
          [attr.aria-label]="showConfirmPassword() ? 'Скрыть пароль' : 'Показать пароль'"
          [attr.title]="showConfirmPassword() ? 'Скрыть пароль' : 'Показать пароль'"
          (click)="toggleConfirmPasswordVisibility()">
          @if (showConfirmPassword()) {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 3l18 18" />
            <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58" />
            <path d="M9.88 4.24A9.4 9.4 0 0 1 12 4c5.5 0 9 5.5 9 8a6.4 6.4 0 0 1-1.56 2.95" />
            <path d="M6.1 6.1C4.14 7.46 3 10.06 3 12c0 2.5 3.5 8 9 8 1.27 0 2.43-.29 3.45-.76" />
          </svg>
          } @else {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2.5 12s3.5-7 9.5-7 9.5 7 9.5 7-3.5 7-9.5 7-9.5-7-9.5-7Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          }
        </button>
      </div>
    </div>

    @if (newPassword && confirmPassword && newPassword !== confirmPassword) {
    <div class="login__error">Пароли не совпадают</div>
    }

    <button
      class="btn-login"
      type="submit"
      [disabled]="
        loading() || newPassword.length < 8 || newPassword !== confirmPassword
      ">
      {{ loading() ? 'Сохранение…' : 'Сохранить пароль' }}
    </button>
  </form>

  <p class="login__footer-link"><a routerLink="/auth">Ко входу</a></p>
  }
</main>
