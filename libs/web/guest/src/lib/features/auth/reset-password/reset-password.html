<main class="login">
  <h1>Новый пароль</h1>

  @if (!token) {
  <div class="login__error">Ссылка недействительна или устарела. Запросите восстановление ещё раз.</div>
  <p class="login__footer-link"><a routerLink="/auth/forgot-password">Забыли пароль?</a></p>
  } @else {
  @if (error()) {
  <div class="login__error">{{ error() }}</div>
  }

  <form class="login__form" (ngSubmit)="onSubmit()" novalidate>
    <div class="login__field">
      <label for="pw">Новый пароль</label>
      <input
        id="pw"
        name="newPassword"
        type="password"
        [(ngModel)]="newPassword"
        placeholder="Не менее 8 символов"
        autocomplete="new-password" />
    </div>

    <div class="login__field">
      <label for="pw2">Повтор пароля</label>
      <input
        id="pw2"
        name="confirmPassword"
        type="password"
        [(ngModel)]="confirmPassword"
        placeholder="Повторите пароль"
        autocomplete="new-password" />
    </div>

    @if (newPassword && confirmPassword && newPassword !== confirmPassword) {
    <div class="login__error">Пароли не совпадают</div>
    }

    <button
      class="btn-login"
      type="submit"
      [disabled]="
        loading() || newPassword.length < 8 || newPassword !== confirmPassword
      ">
      {{ loading() ? 'Сохранение…' : 'Сохранить пароль' }}
    </button>
  </form>

  <p class="login__footer-link"><a routerLink="/auth">Ко входу</a></p>
  }
</main>
