<main class="login">
  <h1>Новый пароль</h1>

  @if (!token) {
  <div class="login__error">Ссылка недействительна или устарела. Запросите восстановление ещё раз.</div>
  <p class="login__footer-link"><a routerLink="/auth/password-recovery">Запросить новую ссылку</a></p>
  } @else {
  @if (error()) {
  <div class="login__error">{{ error() }}</div>
  }

  <div class="login__field">
    <label for="recovery-password">Новый пароль</label>
    <input
      id="recovery-password"
      type="password"
      [(ngModel)]="newPassword"
      placeholder="Не менее 8 символов"
      autocomplete="new-password" />
  </div>

  <div class="login__field">
    <label for="recovery-password-confirm">Повторите пароль</label>
    <input
      id="recovery-password-confirm"
      type="password"
      [(ngModel)]="confirmPassword"
      placeholder="Повторите пароль"
      autocomplete="new-password" />
  </div>

  @if (newPassword && confirmPassword && newPassword !== confirmPassword) {
  <div class="login__error">Пароли не совпадают</div>
  }

  <button
    class="btn-login"
    type="button"
    (click)="onSubmit()"
    [disabled]="loading() || newPassword.length < 8 || newPassword !== confirmPassword">
    {{ loading() ? 'Сохранение...' : 'Сохранить пароль' }}
  </button>

  <p class="login__footer-link"><a routerLink="/auth">Ко входу</a></p>
  }
</main>
