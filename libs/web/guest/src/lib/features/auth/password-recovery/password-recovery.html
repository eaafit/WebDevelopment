<main class="login">
  <h1>Восстановление пароля по email</h1>

  @if (done()) {
  <p class="login__hint">
    Если аккаунт с таким email существует, мы отправили ссылку для сброса пароля на указанный адрес.
  </p>
  <a routerLink="/auth" class="home-link">Вернуться ко входу</a>
  } @else {
  @if (error()) {
  <div class="login__error">{{ error() }}</div>
  }

  <div class="login__field">
    <label for="recovery-email">Email</label>
    <input
      id="recovery-email"
      type="email"
      [(ngModel)]="email"
      placeholder="you@example.com"
      autocomplete="email" />
  </div>

  <button class="btn-login" type="button" (click)="onSubmit()" [disabled]="loading()">
    {{ loading() ? 'Отправка...' : 'Отправить ссылку' }}
  </button>

  <p class="login__footer-link">
    <a routerLink="/auth">Назад ко входу</a>
  </p>
  }
</main>
