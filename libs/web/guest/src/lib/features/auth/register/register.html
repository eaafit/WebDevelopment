<main class="login">
  <h1>Регистрация</h1>

  <form class="login__form" (ngSubmit)="onSubmit()" novalidate>
    <div class="login__field">
      <label for="fullName">ФИО</label>
      <input
        id="fullName"
        name="fullName"
        type="text"
        [(ngModel)]="fullName"
        placeholder="Иванов Иван Иванович"
        autocomplete="name" />
    </div>

    <div class="login__field">
      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        [(ngModel)]="email"
        placeholder="you@example.com"
        autocomplete="email" />
    </div>

    <div class="login__field">
      <label for="phoneNumber">Телефон</label>
      <input
        id="phoneNumber"
        name="phoneNumber"
        type="tel"
        [ngModel]="phoneNumber"
        (ngModelChange)="onPhoneNumberChange($event)"
        placeholder="+7 999 123-45-67"
        maxlength="18"
        inputmode="numeric"
        autocomplete="tel" />
    </div>

    <fieldset class="login__field login__role-field">
      <legend>Роль</legend>
      <label class="role-option">
        <input type="radio" name="role" [value]="UserRole.Applicant" [(ngModel)]="role" />
        <span>Заявитель</span>
      </label>
      <label class="role-option">
        <input type="radio" name="role" [value]="UserRole.Notary" [(ngModel)]="role" />
        <span>Нотариус</span>
      </label>
    </fieldset>

    <div class="login__field">
      <label for="password">Пароль</label>
      <div class="login__password-control">
        <input
          id="password"
          name="password"
          [type]="showPassword() ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder="Минимум 8 символов"
          autocomplete="new-password" />
        <button
          class="login__password-toggle"
          type="button"
          [attr.aria-label]="showPassword() ? 'Скрыть пароль' : 'Показать пароль'"
          [attr.title]="showPassword() ? 'Скрыть пароль' : 'Показать пароль'"
          (click)="togglePasswordVisibility()">
          @if (showPassword()) {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 3l18 18" />
            <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58" />
            <path d="M9.88 4.24A9.4 9.4 0 0 1 12 4c5.5 0 9 5.5 9 8a6.4 6.4 0 0 1-1.56 2.95" />
            <path d="M6.1 6.1C4.14 7.46 3 10.06 3 12c0 2.5 3.5 8 9 8 1.27 0 2.43-.29 3.45-.76" />
          </svg>
          } @else {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2.5 12s3.5-7 9.5-7 9.5 7 9.5 7-3.5 7-9.5 7-9.5-7-9.5-7Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          }
        </button>
      </div>
    </div>

    <div class="login__field">
      <label for="confirmPassword">Повторите пароль</label>
      <div class="login__password-control">
        <input
          id="confirmPassword"
          name="confirmPassword"
          [type]="showConfirmPassword() ? 'text' : 'password'"
          [(ngModel)]="confirmPassword"
          placeholder="Повторите пароль"
          autocomplete="new-password" />
        <button
          class="login__password-toggle"
          type="button"
          [attr.aria-label]="showConfirmPassword() ? 'Скрыть пароль' : 'Показать пароль'"
          [attr.title]="showConfirmPassword() ? 'Скрыть пароль' : 'Показать пароль'"
          (click)="toggleConfirmPasswordVisibility()">
          @if (showConfirmPassword()) {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 3l18 18" />
            <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58" />
            <path d="M9.88 4.24A9.4 9.4 0 0 1 12 4c5.5 0 9 5.5 9 8a6.4 6.4 0 0 1-1.56 2.95" />
            <path d="M6.1 6.1C4.14 7.46 3 10.06 3 12c0 2.5 3.5 8 9 8 1.27 0 2.43-.29 3.45-.76" />
          </svg>
          } @else {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2.5 12s3.5-7 9.5-7 9.5 7 9.5 7-3.5 7-9.5 7-9.5-7-9.5-7Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          }
        </button>
      </div>
    </div>

    <label class="login__checkbox">
      <input type="checkbox" name="termsAccepted" [(ngModel)]="termsAccepted" />
      <span>Я согласен с условиями использования сервиса</span>
    </label>

    @if (validationError) {
    <div class="login__error">{{ validationError }}</div>
    }

    @if (error()) {
    <div class="login__error">{{ error() }}</div>
    }

    <button class="btn-login" type="submit" [disabled]="loading()">
      {{ loading() ? 'Регистрация...' : 'Зарегистрироваться' }}
    </button>
  </form>

  <div class="login__oauth">
    <div class="login__oauth-divider"><span>или</span></div>
    <button
      class="login__oauth-btn"
      type="button"
      data-testid="google-login"
      [disabled]="loading()"
      (click)="onOAuthLogin('google')">
      <svg class="login__oauth-icon" viewBox="0 0 18 18" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62Z" />
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18Z" />
        <path fill="#FBBC05" d="M3.97 10.72a5.4 5.4 0 0 1 0-3.44V4.95H.96a9 9 0 0 0 0 8.1l3.01-2.33Z" />
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58Z" />
      </svg>
      Зарегистрироваться через Google
    </button>
    <button
      class="login__oauth-btn"
      type="button"
      data-testid="yandex-login"
      [disabled]="loading()"
      (click)="onOAuthLogin('yandex')">
      <svg class="login__oauth-icon" viewBox="0 0 18 18" aria-hidden="true">
        <circle cx="9" cy="9" r="9" fill="#FC3F1D" />
        <path fill="#fff" d="M10.06 4.4h-1.1c-1.7 0-2.86 1.05-2.86 2.6 0 1.24.58 1.97 1.66 2.7l-.18.12-2.2 3.78h1.45l2-3.5h.66v3.5h1.27V4.4Zm-.65 4.7h-.5c-.86 0-1.45-.5-1.45-1.5 0-1.04.52-1.55 1.4-1.55h.55V9.1Z" />
      </svg>
      Зарегистрироваться через Яндекс
    </button>
    <button
      class="login__oauth-btn"
      type="button"
      data-testid="vk-login"
      [disabled]="loading()"
      (click)="onOAuthLogin('vk')">
      <svg class="login__oauth-icon" viewBox="0 0 18 18" aria-hidden="true">
        <rect width="18" height="18" rx="4" fill="#07F" />
        <path fill="#fff" d="M9.6 12.8c-3.5 0-5.5-2.4-5.6-6.4h1.76c.06 2.94 1.36 4.18 2.38 4.44V6.4h1.66v2.54c1.01-.11 2.07-1.26 2.43-2.54h1.66c-.27 1.58-1.42 2.73-2.24 3.2.82.39 2.13 1.39 2.63 3.2h-1.83c-.39-1.21-1.36-2.15-2.65-2.28v2.28H9.6Z" />
      </svg>
      Зарегистрироваться через ВКонтакте
    </button>
  </div>

  <p class="login__footer-link">
    Уже есть аккаунт? <a routerLink="/auth">Войти</a>
  </p>
</main>
