<main class="login">
  <h1>Регистрация</h1>

  <form class="login__form" (ngSubmit)="onSubmit()" novalidate>
    <div class="login__field">
      <label for="fullName">ФИО</label>
      <input
        id="fullName"
        name="fullName"
        type="text"
        [(ngModel)]="fullName"
        placeholder="Иванов Иван Иванович"
        autocomplete="name" />
    </div>

    <div class="login__field">
      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        [(ngModel)]="email"
        placeholder="you@example.com"
        autocomplete="email" />
    </div>

    <div class="login__field">
      <label for="phoneNumber">Телефон</label>
      <input
        id="phoneNumber"
        name="phoneNumber"
        type="tel"
        [(ngModel)]="phoneNumber"
        placeholder="+7 999 123-45-67"
        autocomplete="tel" />
    </div>

    <fieldset class="login__field login__role-field">
      <legend>Роль</legend>
      <label class="role-option">
        <input type="radio" name="role" [value]="UserRole.Applicant" [(ngModel)]="role" />
        <span>Заявитель</span>
      </label>
      <label class="role-option">
        <input type="radio" name="role" [value]="UserRole.Notary" [(ngModel)]="role" />
        <span>Нотариус</span>
      </label>
    </fieldset>

    <div class="login__field">
      <label for="password">Пароль</label>
      <div class="login__password-control">
        <input
          id="password"
          name="password"
          [type]="showPassword() ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder="Минимум 8 символов"
          autocomplete="new-password" />
        <button
          class="login__password-toggle"
          type="button"
          [attr.aria-label]="showPassword() ? 'Скрыть пароль' : 'Показать пароль'"
          [attr.title]="showPassword() ? 'Скрыть пароль' : 'Показать пароль'"
          (click)="togglePasswordVisibility()">
          @if (showPassword()) {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 3l18 18" />
            <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58" />
            <path d="M9.88 4.24A9.4 9.4 0 0 1 12 4c5.5 0 9 5.5 9 8a6.4 6.4 0 0 1-1.56 2.95" />
            <path d="M6.1 6.1C4.14 7.46 3 10.06 3 12c0 2.5 3.5 8 9 8 1.27 0 2.43-.29 3.45-.76" />
          </svg>
          } @else {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2.5 12s3.5-7 9.5-7 9.5 7 9.5 7-3.5 7-9.5 7-9.5-7-9.5-7Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          }
        </button>
      </div>
    </div>

    <div class="login__field">
      <label for="confirmPassword">Повторите пароль</label>
      <div class="login__password-control">
        <input
          id="confirmPassword"
          name="confirmPassword"
          [type]="showConfirmPassword() ? 'text' : 'password'"
          [(ngModel)]="confirmPassword"
          placeholder="Повторите пароль"
          autocomplete="new-password" />
        <button
          class="login__password-toggle"
          type="button"
          [attr.aria-label]="showConfirmPassword() ? 'Скрыть пароль' : 'Показать пароль'"
          [attr.title]="showConfirmPassword() ? 'Скрыть пароль' : 'Показать пароль'"
          (click)="toggleConfirmPasswordVisibility()">
          @if (showConfirmPassword()) {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 3l18 18" />
            <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58" />
            <path d="M9.88 4.24A9.4 9.4 0 0 1 12 4c5.5 0 9 5.5 9 8a6.4 6.4 0 0 1-1.56 2.95" />
            <path d="M6.1 6.1C4.14 7.46 3 10.06 3 12c0 2.5 3.5 8 9 8 1.27 0 2.43-.29 3.45-.76" />
          </svg>
          } @else {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2.5 12s3.5-7 9.5-7 9.5 7 9.5 7-3.5 7-9.5 7-9.5-7-9.5-7Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          }
        </button>
      </div>
    </div>

    <label class="login__checkbox">
      <input type="checkbox" name="termsAccepted" [(ngModel)]="termsAccepted" />
      <span>Я согласен с условиями использования сервиса</span>
    </label>

    @if (validationError) {
    <div class="login__error">{{ validationError }}</div>
    }

    @if (error()) {
    <div class="login__error">{{ error() }}</div>
    }

    <button class="btn-login" type="submit" [disabled]="loading()">
      {{ loading() ? 'Регистрация...' : 'Зарегистрироваться' }}
    </button>
  </form>

  <p class="login__footer-link">
    Уже есть аккаунт? <a routerLink="/auth">Войти</a>
  </p>
</main>
