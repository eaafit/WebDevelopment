<main class="login">
  <h1>Вход в систему</h1>

  @if (error()) {
  <div class="login__error">{{ error() }}</div>
  }

  @if (validationError()) {
  <div class="login__error">{{ validationError() }}</div>
  }

  <form class="login__form" (ngSubmit)="onLogin()" novalidate>
    <div class="login__field">
      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        [(ngModel)]="email"
        placeholder="you@example.com"
        autocomplete="email" />
    </div>

    <div class="login__field">
      <label for="password">Пароль</label>
      <div class="login__password-control">
        <input
          id="password"
          name="password"
          [type]="showPassword() ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder="••••••••"
          autocomplete="current-password" />
        <button
          class="login__password-toggle"
          type="button"
          [attr.aria-label]="showPassword() ? 'Скрыть пароль' : 'Показать пароль'"
          [attr.title]="showPassword() ? 'Скрыть пароль' : 'Показать пароль'"
          (click)="togglePasswordVisibility()">
          @if (showPassword()) {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 3l18 18" />
            <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58" />
            <path d="M9.88 4.24A9.4 9.4 0 0 1 12 4c5.5 0 9 5.5 9 8a6.4 6.4 0 0 1-1.56 2.95" />
            <path d="M6.1 6.1C4.14 7.46 3 10.06 3 12c0 2.5 3.5 8 9 8 1.27 0 2.43-.29 3.45-.76" />
          </svg>
          } @else {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2.5 12s3.5-7 9.5-7 9.5 7 9.5 7-3.5 7-9.5 7-9.5-7-9.5-7Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          }
        </button>
      </div>
    </div>

    <a class="login__restore-link" data-testid="forgot-password-link" routerLink="/auth/forgot-password">
      Забыли пароль?
    </a>

    <button class="btn-login" type="submit" [disabled]="loading()">
      {{ loading() ? 'Вход...' : 'Войти' }}
    </button>
  </form>

  <div class="login__oauth">
    <div class="login__oauth-divider"><span>или</span></div>
    <button
      class="login__oauth-btn"
      type="button"
      data-testid="google-login"
      [disabled]="loading()"
      (click)="onOAuthLogin('google')">
      <svg class="login__oauth-icon" viewBox="0 0 18 18" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62Z" />
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18Z" />
        <path fill="#FBBC05" d="M3.97 10.72a5.4 5.4 0 0 1 0-3.44V4.95H.96a9 9 0 0 0 0 8.1l3.01-2.33Z" />
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58Z" />
      </svg>
      Войти через Google
    </button>
    <button
      class="login__oauth-btn"
      type="button"
      data-testid="yandex-login"
      [disabled]="loading()"
      (click)="onOAuthLogin('yandex')">
      <svg class="login__oauth-icon" viewBox="0 0 18 18" aria-hidden="true">
        <circle cx="9" cy="9" r="9" fill="#FC3F1D" />
        <path fill="#fff" d="M10.06 4.4h-1.1c-1.7 0-2.86 1.05-2.86 2.6 0 1.24.58 1.97 1.66 2.7l-.18.12-2.2 3.78h1.45l2-3.5h.66v3.5h1.27V4.4Zm-.65 4.7h-.5c-.86 0-1.45-.5-1.45-1.5 0-1.04.52-1.55 1.4-1.55h.55V9.1Z" />
      </svg>
      Войти через Яндекс
    </button>
  </div>

  <p class="login__footer-link">
    <a data-testid="register-link" routerLink="/auth/register">Регистрация</a>
  </p>

  @if (showTestAccountHints) {
  <section class="login__test-accounts" aria-label="Тестовые аккаунты">
    <h2>Тестовые аккаунты</h2>
    <ul>
      @for (account of testAccounts; track account.email) {
      <li>
        <button class="login__test-account" type="button" (click)="onUseTestAccount(account)">
          <span class="login__test-account-role">{{ account.role }}</span>
          <span class="login__test-account-creds">
            <code>{{ account.email }}</code>
            <span>/</span>
            <code>{{ account.password }}</code>
          </span>
          @if (copiedAccount() === account.email) {
          <span class="login__test-account-copied">Скопировано</span>
          } @else {
          <span class="login__test-account-action">Скопировать</span>
          }
        </button>
      </li>
      }
    </ul>
  </section>
  }
</main>
