<div class="pagination">
  <button 
    class="page-btn" 
    [class.disabled]="!hasPrev()" 
    (click)="hasPrev() && goToPrev()()">
    &larr; Назад
  </button>

  <div class="page-info">
    {{ current() }} из {{ totalPages() }}
  </div>

  <button 
    class="page-btn" 
    [class.disabled]="!hasNext()" 
    (click)="hasNext() && goToNext()()">
    Вперед &rarr;
  </button>
</div>
