<div class="document-row">
  <div class="row">
    <span class="value">{{ document().fileName }}</span>
  </div>
  <div class="row">
    <span class="param">Тип файла</span>
    <span class="value">{{ document().fileType | slice:0:3 }}</span>
  </div>
  <div class="row">
    <span class="param">Версия файла</span>
    <span class="value">{{ document().version }}</span>
  </div>
  <div class="row">
    <span class="param">Заявка</span>
    <span class="value"></span>
  </div>
  <div class="row date-row">
  <span class="param">Дата загрузки</span>
  <div class="value date-container">
    @if (uploaded()) {
      <div class="date-text">{{ uploaded()?.date }}</div>
      <div class="time-text">{{ uploaded()?.time }}</div>
    } @else {
      -
    }
  </div>
</div>
  <div class="card-footer" (click)="navigateToDocumentPage()">
    <span class="action-text">Открыть детали</span>
  </div>
</div>
