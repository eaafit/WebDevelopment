<fieldset class="new-doc-fieldset">
  <legend class="form-title">Заказать копию</legend>

  <div class="input-block">
    <label class="label" for="a">Выберите заявку</label>
    <select class="select-field" name="a" (change)="onAssesmentChange($event)">
      @for (assesment of assesments; track assesment.id) {
      @if (assesment.id === selectedAssesmentID()){
      <option [value]="assesment.id" selected>{{ assesment.description }}</option>
      } @else {
      <option [value]="assesment.id">{{ assesment.description }}</option>
      }
      }
    </select>
  </div>

  <div class="input-block document-section">
    <label class="label">
      Заключение <span class="required">*</span>
    </label>
    <input class="file-input" id="documentFile" type="file" accept=".pdf,.doc,.docx"
      (change)="onDocumentUpload($event)" />

    @if (doc()) {
    <div class="file-card">
      <span class="file-name">📄 {{ doc()?.fileName }}</span>
    </div>
    }
  </div>

  <button class="submit-btn" (click)="onSubmit()">Сохранить документ</button>
</fieldset>
