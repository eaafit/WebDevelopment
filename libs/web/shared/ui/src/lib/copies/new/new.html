<fieldset class="new-doc-fieldset">
  <legend class="form-title">Заказать копию</legend>

  <div class="input-block">
    <label class="label" for="assessment-select">Выберите заявку</label>
    <select 
      id="assessment-select"
      class="select-field" 
      name="assessment" 
      (change)="onAssesmentChange($event)">
      @for (assesment of assesments(); track assesment.id) {
        <option [value]="assesment.id" [selected]="assesment.id === selectedAssesmentID()">
          {{ assesment.description || 'Заявка #' + assesment.id }}
        </option>
      } @empty {
        <option value="123" selected>Тестовая заявка (Ошибка бэкенда)</option>
      }
    </select>
  </div>

  <div class="input-block document-section">
    <label class="label">
      Заключение <span class="required">*</span>
    </label>
    
    @if (!fileRes()) {
      <input class="file-input" id="documentFile" type="file" accept=".pdf,.doc,.docx"
        (change)="onDocumentUpload($event)" />
    }

    @if (fileRes()) {
      <div class="file-uploaded-container">
        <div class="file-card">
          <span class="file-name">📄 {{ selectedFile?.name || fileRes()?.fileName }}</span>
        </div>
        
        <button type="button" class="btn-remove" (click)="removeDoc()">✕</button>
      </div>
    }
  </div>

  <button class="submit-btn" [disabled]="!fileRes()" (click)="onSubmit()">Сохранить документ</button>
</fieldset>
