<section class="auth-services">
  <div class="auth-card">
    <header class="auth-card__header">
      <h1 class="auth-card__title">Вход через соцсети</h1>
      <p class="auth-card__subtitle">Выберите способ входа и вашу роль</p>
    </header>

    <div class="auth-card__body">
      <!-- Error Message -->
      @if (error) {
        <div class="auth-card__error">
          {{ error }}
        </div>
      }

      <!-- Loading Indicator -->
      @if (isLoading) {
        <div class="auth-card__loading">
          <div class="spinner"></div>
          <p>Перенаправление...</p>
        </div>
      }

      <!-- Role Selector -->
      <div class="role-selector">
        <label class="role-selector__label">Я регистрируюсь как:</label>
        <div class="role-selector__options">
          <button
            type="button"
            class="role-selector__btn"
            [class.role-selector__btn--active]="selectedRole === 'applicant'"
            (click)="onRoleChange('applicant')"
            [disabled]="isLoading"
          >
            <span class="role-selector__icon">👤</span>
            <span class="role-selector__text">Заказчик</span>
          </button>
          <button
            type="button"
            class="role-selector__btn"
            [class.role-selector__btn--active]="selectedRole === 'notary'"
            (click)="onRoleChange('notary')"
            [disabled]="isLoading"
          >
            <span class="role-selector__icon">⚖️</span>
            <span class="role-selector__text">Нотариус</span>
          </button>
        </div>
      </div>

      <!-- OAuth Providers -->
      <div class="auth-card__providers">
        <button
          type="button"
          class="provider-btn provider-btn--vk"
          (click)="signInWithVk()"
          title="Войти через VK"
          [disabled]="isLoading"
        >
          <span class="provider-btn__icon">VK</span>
        </button>

        <button
          type="button"
          class="provider-btn provider-btn--google"
          (click)="signInWithGoogle()"
          title="Войти через Google"
          [disabled]="isLoading"
        >
          <span class="provider-btn__icon">G</span>
        </button>

        <button
          type="button"
          class="provider-btn provider-btn--apple"
          (click)="signInWithApple()"
          title="Войти через Apple"
          [disabled]="isLoading"
        >
          <span class="provider-btn__icon"></span>
        </button>

        <button
          type="button"
          class="provider-btn provider-btn--yandex"
          (click)="signInWithYandex()"
          title="Войти через Яндекс"
          [disabled]="isLoading"
        >
          <span class="provider-btn__icon">Я</span>
        </button>
      </div>
    </div>
  </div>
</section>
