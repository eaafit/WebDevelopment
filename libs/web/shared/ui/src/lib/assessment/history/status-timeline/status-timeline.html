<div class="timeline-horizontal" [class.compact]="compact">
  <div *ngFor="let stage of stages; let i = index" class="timeline-stage">
    <div class="stage-circle" [class.completed]="isCompleted(i)" [class.current]="isCurrent(i)"></div>
    <span class="stage-label" *ngIf="!compact">{{ stage.label }}</span>
    <div *ngIf="i < stages.length - 1" class="stage-line" [class.completed]="isCompleted(i) || isCurrent(i)"></div>
  </div>
</div>
