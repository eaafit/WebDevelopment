syntax = "proto3";

package notary.tariff_plan.v1alpha1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "notary/common/v1alpha1/common.proto";

// Админские операции над тарифными планами (страница «Тарифные планы»).
service TariffPlanAdminService {
  rpc ListTariffPlans(ListTariffPlansRequest) returns (ListTariffPlansResponse);
  rpc GetTariffPlan(GetTariffPlanRequest) returns (GetTariffPlanResponse);
  rpc CreateTariffPlan(CreateTariffPlanRequest) returns (CreateTariffPlanResponse);
  rpc UpdateTariffPlan(UpdateTariffPlanRequest) returns (UpdateTariffPlanResponse);
  rpc DeleteTariffPlan(DeleteTariffPlanRequest) returns (DeleteTariffPlanResponse);
}

enum TariffPlanStatusFilter {
  TARIFF_PLAN_STATUS_FILTER_UNSPECIFIED = 0;
  TARIFF_PLAN_STATUS_FILTER_ACTIVE = 1;
  TARIFF_PLAN_STATUS_FILTER_INACTIVE = 2;
}

message TariffPlan {
  int32 id = 1;
  string name = 2;
  double price = 3;
  optional string description = 4;
  bool is_active = 5;
  google.protobuf.Timestamp valid_from = 6;
  google.protobuf.Timestamp valid_to = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message TariffPlanListFilters {
  optional string name_contains = 1 [(buf.validate.field).string.max_len = 200];
  TariffPlanStatusFilter status = 2;
  optional google.protobuf.Timestamp valid_from_gte = 3;
  optional google.protobuf.Timestamp valid_to_lte = 4;
  optional string sort_field = 5 [(buf.validate.field).string.max_len = 64];
  optional string sort_direction = 6 [(buf.validate.field).string = {
    in: [
      "asc",
      "desc"
    ]
  }];
}

message ListTariffPlansRequest {
  notary.common.v1alpha1.PaginationParams pagination = 1 [(buf.validate.field).required = true];
  TariffPlanListFilters filters = 2;
}

message ListTariffPlansResponse {
  repeated TariffPlan plans = 1;
  notary.common.v1alpha1.PaginationMeta meta = 2;
}

message GetTariffPlanRequest {
  int32 id = 1 [(buf.validate.field).int32.gt = 0];
}

message GetTariffPlanResponse {
  TariffPlan plan = 1;
}

message CreateTariffPlanRequest {
  string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  double price = 2;
  optional string description = 3 [(buf.validate.field).string.max_len = 4000];
  bool is_active = 4;
  google.protobuf.Timestamp valid_from = 5 [(buf.validate.field).required = true];
  google.protobuf.Timestamp valid_to = 6 [(buf.validate.field).required = true];
}

message CreateTariffPlanResponse {
  TariffPlan plan = 1;
}

message UpdateTariffPlanRequest {
  int32 id = 1 [(buf.validate.field).int32.gt = 0];
  optional string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 255
  }];
  optional double price = 3;
  optional string description = 4 [(buf.validate.field).string.max_len = 4000];
  optional bool is_active = 5;
  optional google.protobuf.Timestamp valid_from = 6;
  optional google.protobuf.Timestamp valid_to = 7;
}

message UpdateTariffPlanResponse {
  TariffPlan plan = 1;
}

message DeleteTariffPlanRequest {
  int32 id = 1 [(buf.validate.field).int32.gt = 0];
}

message DeleteTariffPlanResponse {}
