syntax = "proto3";

package notary.document.v1alpha1;

import "google/protobuf/timestamp.proto";
import "notary/common/v1alpha1/common.proto";

// DocumentService управляет документами и заказами на копии нотариальных
// документов. Документ всегда привязан к заявке (Assessment); заказ на копию —
// это документ-основание (например доверенность) со своим жизненным циклом
// (см. DocumentStatus), который ведёт нотариус.
service DocumentService {
  // Создать документ/заказ копии: загружает файл-основание в хранилище и
  // создаёт запись, привязанную к заявке. Новый заказ копии получает статус
  // DOCUMENT_STATUS_PENDING_PAYMENT.
  rpc CreateDocument(CreateDocumentRequest) returns (CreateDocumentResponse);
  // Получить один документ по идентификатору (вместе со статусом и ссылками).
  rpc GetDocument(GetDocumentRequest) returns (GetDocumentResponse);
  // Получить список документов заявки с пагинацией и фильтрами.
  rpc ListDocumentsByAssessment(ListDocumentsByAssessmentRequest) returns (ListDocumentsByAssessmentResponse);
  // Удалить документ и связанный объект в хранилище.
  rpc DeleteDocument(DeleteDocumentRequest) returns (DeleteDocumentResponse);
  // Сменить статус заказа копии (жизненный цикл DocumentStatus). Переходы
  // «Взять в работу» (PAID->IN_PROGRESS) и «Готово» (IN_PROGRESS->READY)
  // доступны только нотариусу; оплата (PENDING_PAYMENT->PAID) и получение
  // (READY->DELIVERED) — владельцу заказа.
  rpc UpdateDocumentStatus(UpdateDocumentStatusRequest) returns (UpdateDocumentStatusResponse);
  // Нотариус прикладывает готовую копию (скан-результат) к заказу и переводит его
  // в статус READY. Файл сохраняется в result-поля заказа (отдельно от
  // доверенности-основания), скачивание готовой копии резолвится на эту версию.
  rpc UploadCopyResult(UploadCopyResultRequest) returns (UploadCopyResultResponse);
}

// Тип документа-основания (вид прикреплённого файла).
enum DocumentType {
  DOCUMENT_TYPE_UNSPECIFIED = 0;
  DOCUMENT_TYPE_PASSPORT = 1;
  DOCUMENT_TYPE_PROPERTY_DEED = 2;
  DOCUMENT_TYPE_TECHNICAL_PLAN = 3;
  DOCUMENT_TYPE_CADASTRAL_PASSPORT = 4;
  DOCUMENT_TYPE_PHOTO = 5;
  DOCUMENT_TYPE_OTHER = 6;
  DOCUMENT_TYPE_ADDITIONAL = 7;
}

// Жизненный цикл заказа копии. Собственный статус заказа (не статус заявки),
// что исключает подмену статусом Assessment.
enum DocumentStatus {
  DOCUMENT_STATUS_UNSPECIFIED = 0;
  // Создан, ожидает оплаты заявителем.
  DOCUMENT_STATUS_PENDING_PAYMENT = 1;
  // Оплачен, в очереди на обработку нотариусом.
  DOCUMENT_STATUS_PAID = 2;
  // Нотариус взял заказ в работу.
  DOCUMENT_STATUS_IN_PROGRESS = 3;
  // Копия готова (нотариус приложил сканы), доступна для скачивания.
  DOCUMENT_STATUS_READY = 4;
  // Копия выдана/получена заявителем.
  DOCUMENT_STATUS_DELIVERED = 5;
  // Заказ отменён.
  DOCUMENT_STATUS_CANCELLED = 6;
}

// Фильтры списка документов.
message DocumentFilters {
  // Фильтр по типу документа.
  DocumentType document_type = 1;
  // Фильтр по идентификатору загрузившего пользователя.
  optional string uploaded_by_id = 2;
}

// Документ / заказ копии нотариального документа.
message Document {
  // Идентификатор документа (UUID).
  string id = 1;
  // Идентификатор связанной заявки (Assessment), к которой привязан документ.
  string assessment_id = 2;
  // Отображаемое имя файла.
  string file_name = 3;
  // MIME-тип файла.
  string file_type = 4;
  // Размер файла в байтах.
  int32 file_size = 5;
  // Имя бакета в объектном хранилище (MinIO/S3).
  string bucket_name = 6;
  // Ключ объекта в хранилище.
  string object_key = 7;
  // Версия файла (инкрементируется при повторной загрузке одноимённого файла).
  int32 version = 8;
  // Дата и время загрузки.
  google.protobuf.Timestamp uploaded_at = 9;
  // Идентификатор пользователя, загрузившего документ (владелец заказа копии).
  string uploaded_by_id = 10;
  // Тип документа-основания.
  DocumentType document_type = 11;
  // Ссылка предпросмотра (если доступна).
  string preview_url = 12;
  // Ссылка скачивания готовой копии/файла.
  string download_url = 13;
  // Собственный статус заказа копии (жизненный цикл DocumentStatus).
  DocumentStatus status = 14;
  // Комментарий заявителя к заказу копии.
  string comment = 15;
  // Стоимость копии в рублях (фиксируется при создании заказа).
  int32 price = 16;
  // Ссылка скачивания готовой копии (скан-результат нотариуса). Пусто, пока копия
  // не приложена. При статусе READY/DELIVERED скачивать следует именно её.
  string result_download_url = 17;
}

// Запрос на создание документа/заказа копии.
message CreateDocumentRequest {
  // Идентификатор связанной заявки.
  string assessment_id = 1;
  // Имя загружаемого файла.
  string file_name = 2;
  // MIME-тип файла.
  string file_type = 3;
  // Идентификатор владельца (должен совпадать с аутентифицированным пользователем).
  string uploaded_by_id = 4;
  // Тип документа-основания.
  DocumentType document_type = 5;
  // Содержимое файла.
  bytes file_content = 6;
  // Комментарий заявителя к заказу копии.
  string comment = 7;
  // Стоимость копии в рублях (по типу копии).
  int32 price = 8;
}

// Ответ на создание документа.
message CreateDocumentResponse {
  Document document = 1;
}

// Запрос получения одного документа.
message GetDocumentRequest {
  string id = 1;
}

// Ответ с одним документом.
message GetDocumentResponse {
  Document document = 1;
}

// Запрос списка документов заявки.
message ListDocumentsByAssessmentRequest {
  // Идентификатор заявки (опционально: пусто — все доступные документы).
  string assessment_id = 1;
  // Параметры пагинации.
  notary.common.v1alpha1.PaginationParams pagination = 2;
  // Фильтры.
  DocumentFilters filters = 3;
}

// Ответ со списком документов.
message ListDocumentsByAssessmentResponse {
  repeated Document documents = 1;
  notary.common.v1alpha1.PaginationMeta meta = 2;
}

// Запрос удаления документа.
message DeleteDocumentRequest {
  string id = 1;
}

// Ответ удаления документа.
message DeleteDocumentResponse {
  bool success = 1;
}

// Запрос смены статуса заказа копии.
message UpdateDocumentStatusRequest {
  // Идентификатор документа/заказа.
  string id = 1;
  // Новый статус (целевой переход жизненного цикла).
  DocumentStatus status = 2;
}

// Ответ со статусом заказа после смены.
message UpdateDocumentStatusResponse {
  Document document = 1;
}

// Запрос загрузки готовой копии (скана-результата) к заказу.
message UploadCopyResultRequest {
  // Идентификатор заказа копии (Document).
  string id = 1;
  // Имя файла готовой копии.
  string file_name = 2;
  // MIME-тип файла.
  string file_type = 3;
  // Содержимое файла готовой копии.
  bytes file_content = 4;
}

// Ответ с обновлённым заказом (статус READY, проставлен result-файл).
message UploadCopyResultResponse {
  Document document = 1;
}
