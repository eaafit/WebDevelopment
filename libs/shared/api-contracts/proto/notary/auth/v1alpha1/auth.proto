syntax = "proto3";

package notary.auth.v1alpha1;

import "notary/user/v1alpha1/user.proto";

service AuthService {
  rpc Register (RegisterRequest) returns (RegisterResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc RefreshToken (RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc Logout (LogoutRequest) returns (LogoutResponse);
  rpc ForgotPassword (ForgotPasswordRequest) returns (ForgotPasswordResponse);
  rpc ResetPassword (ResetPasswordRequest) returns (ResetPasswordResponse);
  rpc OAuthInit (OAuthInitRequest) returns (OAuthInitResponse);
  rpc OAuthCallback (OAuthCallbackRequest) returns (OAuthCallbackResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string full_name = 3;
  string phone_number = 4;
  notary.user.v1alpha1.UserRole role = 5;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message AuthResult {
  string access_token = 1;
  string refresh_token = 2;
  notary.user.v1alpha1.User user = 3;
}

message RegisterResponse {
  AuthResult result = 1;
}

message LoginResponse {
  AuthResult result = 1;
}

message RefreshTokenResponse {
  AuthResult result = 1;
}

message LogoutResponse {
  bool success = 1;
}

message ForgotPasswordRequest {
  string email = 1;
}

message ForgotPasswordResponse {}

message ResetPasswordRequest {
  string token = 1;
  string new_password = 2;
}

message ResetPasswordResponse {}

// ─── OAuth 2.0 ──────────────────────────────────────────────────────────────

enum OAuthProvider {
  OAUTH_PROVIDER_UNSPECIFIED = 0;
  OAUTH_PROVIDER_VK = 1;
  OAUTH_PROVIDER_GOOGLE = 2;
  OAUTH_PROVIDER_APPLE = 3;
  OAUTH_PROVIDER_YANDEX = 4;
}

message OAuthInitRequest {
  OAuthProvider provider = 1;
  notary.user.v1alpha1.UserRole role = 2;
  string state = 3; // CSRF protection
}

message OAuthInitResponse {
  string authorization_url = 1;
  string state = 2;
}

message OAuthCallbackRequest {
  OAuthProvider provider = 1;
  string code = 2;
  string state = 3;
}

message OAuthCallbackResponse {
  AuthResult result = 1;
}
