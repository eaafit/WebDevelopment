syntax = "proto3";

package notary.auth.v1alpha1;

import "notary/user/v1alpha1/user.proto";

service AuthService {
  rpc Register (RegisterRequest) returns (RegisterResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc RefreshToken (RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc Logout (LogoutRequest) returns (LogoutResponse);
  rpc ForgotPassword (ForgotPasswordRequest) returns (ForgotPasswordResponse);
  rpc ResetPassword (ResetPasswordRequest) returns (ResetPasswordResponse);

  // OAuth (внешние провайдеры). На этом этапе реализован только Google;
  // generic-форма (поле provider) позволит добавить Yandex/VK без новых RPC.
  rpc GetOAuthAuthorizeUrl (GetOAuthAuthorizeUrlRequest) returns (GetOAuthAuthorizeUrlResponse);
  rpc OAuthLogin (OAuthLoginRequest) returns (OAuthLoginResponse);
}

// Внешний OAuth-провайдер. UNSPECIFIED = 0 для совместимости proto3.
enum OauthProvider {
  OAUTH_PROVIDER_UNSPECIFIED = 0;
  OAUTH_PROVIDER_GOOGLE = 1;
  OAUTH_PROVIDER_YANDEX = 2;
  OAUTH_PROVIDER_VK = 3;
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string full_name = 3;
  string phone_number = 4;
  notary.user.v1alpha1.UserRole role = 5;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message AuthResult {
  string access_token = 1;
  string refresh_token = 2;
  notary.user.v1alpha1.User user = 3;
}

message RegisterResponse {
  AuthResult result = 1;
}

message LoginResponse {
  AuthResult result = 1;
}

message RefreshTokenResponse {
  AuthResult result = 1;
}

message LogoutResponse {
  bool success = 1;
}

message ForgotPasswordRequest {
  string email = 1;
}

message ForgotPasswordResponse {}

message ResetPasswordRequest {
  string token = 1;
  string new_password = 2;
}

message ResetPasswordResponse {}

// Запрос URL авторизации провайдера. Бэкенд возвращает готовый URL
// (с подписанным state) и сам state — фронт дублирует его в sessionStorage
// для сверки на callback (defense-in-depth против CSRF).
message GetOAuthAuthorizeUrlRequest {
  OauthProvider provider = 1;
}

message GetOAuthAuthorizeUrlResponse {
  string url = 1;
  string state = 2;
}

// Завершение OAuth-входа: фронт передаёт code и state, полученные на callback.
message OAuthLoginRequest {
  OauthProvider provider = 1;
  string code = 2;
  string state = 3;
  // device_id выдаётся VK ID на callback и обязателен при обмене кода на токен.
  // Для Google/Yandex пустой.
  string device_id = 4;
}

message OAuthLoginResponse {
  AuthResult result = 1;
}
