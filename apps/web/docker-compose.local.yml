services:
  portal:
    ports:
      - '${PORTAL_PORT:-4200}:80'

  api:
    depends_on:
      mailpit:
        condition: service_started

  postgres:
    ports:
      - '${POSTGRES_PORT:-5432}:5432'

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '${MAILPIT_SMTP_PORT:-1025}:1025'
      - '${MAILPIT_UI_PORT:-8025}:8025'
    networks:
      default:
