# Оверлей для VPS за Nginx Proxy Manager: nexus-web в сети proxy (имя контейнера для NPM).
# Запуск: docker network create proxy (один раз), затем npm и приложение — см. DOCKER.md.

services:
  nexus-web:
    networks:
      - default
      - proxy

networks:
  proxy:
    external: true
    name: proxy
