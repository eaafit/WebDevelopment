services:
  nexus-web:
    build:
      context: ../..
      dockerfile: apps/nexus-web/Dockerfile
    expose:
      - '3000'
    environment:
      NEXUS_SECRET: ${NEXUS_SECRET:?Set NEXUS_SECRET in .env — see env.example}
      PORT: '3000'
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexus
    volumes:
      - nexus_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d nexus']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      default:
        aliases:
          - db

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - nexus_redis_data:/data
    networks:
      default:
        aliases:
          - cache

volumes:
  nexus_pg_data:
  nexus_redis_data:
