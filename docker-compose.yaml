services:
  postgres:
    image: postgres:latest
    container_name: notary-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - notary_data:/var/lib/postgresql
    restart: always

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: notary-postgres-exporter
    ports:
      - '9187:9187'
    environment:
      DATA_SOURCE_URI: 'postgres:5432/${DB_NAME}?sslmode=disable'
      DATA_SOURCE_USER: ${DB_USER}
      DATA_SOURCE_PASS: ${DB_PASS}
    depends_on:
      - postgres
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: notary-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: notary-grafana
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: 'http://localhost:3001'
      GF_INSTALL_PLUGINS: ''
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: notary-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: notary-minio-init
    depends_on:
      - minio
    environment:
      MC_HOST_local: http://${MINIO_ROOT_USER:-minioadmin}:${MINIO_ROOT_PASSWORD:-minioadmin}@minio:9000
      S3_BUCKET_PAYMENT_DOCUMENTS: ${S3_BUCKET_PAYMENT_DOCUMENTS:-payment-documents}
    entrypoint: /bin/sh
    command: -c "sleep 5 && mc mb --ignore-existing local/$${S3_BUCKET_PAYMENT_DOCUMENTS}"
    restart: 'no'

volumes:
  notary_data:
  prometheus_data:
  grafana_data:
  minio_data:
