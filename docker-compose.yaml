services:
  postgres:
    image: postgres:latest
    container_name: notary-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      # Default 5432 avoids conflict with a local PostgreSQL on Windows/Linux using 5432.
      # Set POSTGRES_HOST_PORT=5432 in `.env` if nothing else listens on that port.
      - '${DB_PORT}:5432'
    volumes:
      - notary_data:/var/lib/postgresql
    restart: always

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.18.1
    container_name: notary-postgres-exporter
    ports:
      - '9187:9187'
    environment:
      DATA_SOURCE_URI: 'postgres:5432/${DB_NAME}?sslmode=disable'
      DATA_SOURCE_USER: ${DB_USER}
      DATA_SOURCE_PASS: ${DB_PASS}
    depends_on:
      - postgres
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: notary-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${PWD}/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: notary-alertmanager
    ports:
      - '9093:9093'
    volumes:
      - ./monitoring/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.1
    container_name: notary-loki
    ports:
      - '3100:3100'
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command:
      - '-config.file=/etc/loki/config.yml'
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.1
    container_name: notary-tempo
    ports:
      - '3200:3200'
      - '4317:4317'
      - '4318:4318'
    volumes:
      - ./monitoring/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    command:
      - '-config.file=/etc/tempo/tempo.yml'
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.2.1
    container_name: notary-promtail
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    command:
      - '-config.file=/etc/promtail/config.yml'
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: notary-grafana
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: 'http://localhost:3001'
      GF_INSTALL_PLUGINS: ''
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    depends_on:
      - prometheus
      - loki
      - tempo
      - mailpit
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: notary-mailpit
    ports:
      - '${SMTP_PORT:-1025}:1025'
      - '${MAILPIT_UI_PORT:-8025}:8025'
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: notary-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: notary-minio-init
    depends_on:
      - minio
    environment:
      MC_HOST_local: http://${MINIO_ROOT_USER:-minioadmin}:${MINIO_ROOT_PASSWORD:-minioadmin}@minio:9000
      S3_BUCKET_PAYMENT_DOCUMENTS: ${S3_BUCKET_PAYMENT_DOCUMENTS:-payment-documents}
      S3_BUCKET_ASSESSMENT_FILES: ${S3_BUCKET_ASSESSMENT_FILES:-assessment-files}
    entrypoint: /bin/sh
    command: -c "sleep 5 && mc mb --ignore-existing local/$${S3_BUCKET_PAYMENT_DOCUMENTS} && mc mb --ignore-existing local/$${S3_BUCKET_ASSESSMENT_FILES}"
    restart: 'no'

volumes:
  notary_data:
  prometheus_data:
  loki_data:
  tempo_data:
  promtail_positions:
  grafana_data:
  minio_data:
  alertmanager_data:
