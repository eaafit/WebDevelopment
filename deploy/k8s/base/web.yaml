apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
  selector:
    app: notary-web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notary-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notary-web
  template:
    metadata:
      labels:
        app: notary-web
    spec:
      containers:
        - name: web
          image: notary-portal-web:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
