apiVersion: v1
kind: Service
metadata:
  name: web
  labels:
    app.kubernetes.io/name: notary-portal
    app.kubernetes.io/component: web
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
  selector:
    app: notary-web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notary-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notary-web
  template:
    metadata:
      labels:
        app: notary-web
    spec:
      serviceAccountName: notary-web
      containers:
        - name: web
          image: notary-portal-web:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
