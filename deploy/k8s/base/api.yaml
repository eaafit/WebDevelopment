apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app.kubernetes.io/name: notary-portal
    app.kubernetes.io/component: api
spec:
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app: notary-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notary-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notary-api
  template:
    metadata:
      labels:
        app: notary-api
    spec:
      serviceAccountName: notary-api
      containers:
        - name: api
          image: notary-portal-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: notary-portal-config
            - secretRef:
                name: notary-portal-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 6
