global:
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  environment: production
  partOf: notary-portal

nameOverride: ''
fullnameOverride: ''

namespace:
  create: false
  name: ''

config:
  nodeEnv: production
  port: '3000'
  logLevel: info
  corsOrigin: http://localhost:8080
  frontendUrl: http://localhost:8080
  fiasProvider: stub
  mailTransport: log
  paymentProvider: robokassa
  robokassaTestMode: 'true'
  s3Endpoint: http://minio:9000
  s3Region: us-east-1
  s3ForcePathStyle: 'true'
  s3BucketPaymentDocuments: payment-documents
  s3BucketAssessmentFiles: assessment-files

secret:
  create: true
  name: notary-portal-secret
  stringData:
    DB_NAME: db
    DB_USER: admin
    DB_PASS: change-me
    DATABASE_URL: postgresql://admin:change-me@postgres:5432/db?schema=public
    JWT_ACCESS_SECRET: change-me-use-a-long-random-secret
    ROBOKASSA_MERCHANT_LOGIN: Test1999
    ROBOKASSA_PASSWORD_1: password_1
    ROBOKASSA_PASSWORD_2: password_2
    S3_ACCESS_KEY: minioadmin
    S3_SECRET_KEY: minioadmin

api:
  enabled: true
  name: api
  replicaCount: 1
  image:
    repository: notary-portal-api
    tag: local
    pullPolicy: ''
  service:
    type: ClusterIP
    port: 3000
  serviceAccount:
    create: true
    name: ''
    automountServiceAccountToken: false
  podAnnotations: {}
  podLabels: {}
  env: []
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  podSecurityContext: {}
  readinessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 6
  livenessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 20
    failureThreshold: 6
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 1

web:
  enabled: true
  name: web
  replicaCount: 1
  image:
    repository: notary-portal-web
    tag: local
    pullPolicy: ''
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    name: ''
    automountServiceAccountToken: false
  podAnnotations: {}
  podLabels: {}
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  podSecurityContext: {}
  readinessProbe:
    enabled: true
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    enabled: true
    path: /
    initialDelaySeconds: 15
    periodSeconds: 20
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1

migrations:
  enabled: true
  name: prisma-migrate
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  command:
    - sh
    - -c
    - cd /app/prisma && ../node_modules/.bin/prisma migrate deploy
  serviceAccount:
    create: true
    name: ''
    automountServiceAccountToken: false

postgres:
  enabled: true
  name: postgres
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  service:
    port: 5432
  persistence:
    enabled: true
    size: 1Gi
    accessModes:
      - ReadWriteOnce
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  pdb:
    enabled: true
    minAvailable: 1

ingress:
  enabled: true
  className: nginx
  host: notary.local
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
  tls: []
  apiExactPaths:
    - /health
    - /metrics
  apiPrefixPaths:
    - /api
    - /notary.

networkPolicy:
  enabled: true
  allowIngressFromAllNamespaces: true
  allowExternalEgress:
    enabled: true
    ports:
      - 80
      - 443
  dnsPorts:
    - 53

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
  prometheusRule:
    enabled: true
    failedAccessThreshold: 20
    failedAccessWindow: 10m
    apiDownFor: 2m

releaseEvidence:
  enabled: true
  semverTagPattern: '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-rc\.(0|[1-9][0-9]*))?$'
  sbomPath: docs/security/sbom/notary-portal-pnpm.cdx.json
